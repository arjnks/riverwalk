<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book | Aura Convention Centre</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">AURA<span>.</span></a>
            <button class="mobile-menu-btn"><span></span><span></span><span></span></button>
            <div class="nav-links-wrapper">
                <div class="nav-links">
                    <a href="about.html">Legacy</a>
                    <a href="facilities.html">Experience</a>
                    <a href="gallery.html">Spaces</a>
                    <a href="booking.html" class="btn btn-primary active">Book</a>
                </div>
            </div>
        </div>
    </nav>
    <div id="smooth-wrapper">
        <div id="smooth-content">
            <section class="section-padding bg-light" style="padding-top: 200px; min-height: 100vh;">
                <div class="container">
                    <div class="grid-2">
                        <div>
                            <h1 class="reveal" style="font-size: clamp(3rem, 8vw, 6rem); margin-bottom: 30px;">Reserve<br>Your Date.</h1>
                            <p class="reveal" style="margin-bottom: 50px;">Contact our event concierges to orchestrate your legacy.</p>
                        </div>
                        <form class="reveal" style="background-color: var(--primary); padding: 50px; border: 1px solid rgba(255,255,255,0.05);">
                            <div style="margin-bottom: 30px;">
                                <label>Full Name</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div style="margin-bottom: 30px;">
                                <label>Email</label>
                                <input type="email" class="form-control" required>
                            </div>
                            <div style="margin-bottom: 30px;">
                                <label>Event Type</label>
                                <input type="text" class="form-control">
                            </div>
                            <div style="margin-bottom: 40px;">
                                <label>Estimated Guests</label>
                                <input type="number" class="form-control">
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Inquiry</button>
                        </form>
                    </div>
                </div>
            </section>
            <footer class="footer">
                <div class="container">
                    <p>&copy; 2024 Aura Convention Centre. All rights reserved.</p>
                </div>
            </footer>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
