<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaces | Aura Convention Centre</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">AURA<span>.</span></a>
            <button class="mobile-menu-btn"><span></span><span></span><span></span></button>
            <div class="nav-links-wrapper">
                <div class="nav-links">
                    <a href="about.html">Legacy</a>
                    <a href="facilities.html">Experience</a>
                    <a href="gallery.html" class="active">Spaces</a>
                    <a href="booking.html" class="btn btn-primary">Book</a>
                </div>
            </div>
        </div>
    </nav>
    <div id="smooth-wrapper">
        <div id="smooth-content">
            <section class="section-padding bg-primary" style="padding-top: 200px; min-height: 100vh;">
                <div class="container">
                    <h1 class="reveal" style="font-size: clamp(4rem, 10vw, 12rem); margin-bottom: 100px;">Our Spaces.</h1>
                    
                    <div class="grid-2">
                        <div class="reveal img-placeholder" style="height: 600px; margin-bottom: 100px;">
                            <img src="assets/hero-2.png" alt="Grand Hall" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.8;">
                        </div>
                        <div class="reveal img-placeholder" style="height: 400px; margin-top: 150px; margin-bottom: 100px;">
                            <img src="assets/abstract-1.png" alt="Lounge" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.8;">
                        </div>
                        <div class="reveal img-placeholder" style="height: 500px; margin-bottom: 100px;">
                            <img src="assets/hero-1.png" alt="Exterior" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.8;">
                        </div>
                        <div class="reveal img-placeholder" style="height: 700px; margin-top: 50px; margin-bottom: 100px;">
                            <img src="assets/abstract-2.png" alt="Detail" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.8;">
                        </div>
                    </div>
                </div>
            </section>
            <footer class="footer">
                <div class="container">
                    <p>&copy; 2024 Aura Convention Centre. All rights reserved.</p>
                </div>
